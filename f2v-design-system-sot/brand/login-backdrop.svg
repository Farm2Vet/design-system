<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960" preserveAspectRatio="xMidYMid slice" fill="none">
  <!-- Farm2Vets login backdrop — a stylized pastoral landscape in the brand
       green ramp: dawn sky + soft sun, rolling hills receding to haze, with
       trees, plowed foreground furrows, drifting clouds and distant birds.
       Authored to sit behind a frosted-glass card (heavy blur softens it). -->
  <defs>
    <linearGradient id="f2v-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe7bd" />
      <stop offset="0.5" stop-color="#e4f1d6" />
      <stop offset="1" stop-color="#f6fbef" />
    </linearGradient>
    <radialGradient id="f2v-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffdf0" stop-opacity="0.95" />
      <stop offset="0.45" stop-color="#fbf4cf" stop-opacity="0.5" />
      <stop offset="1" stop-color="#fbf4cf" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="f2v-hill-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4e2ae" />
      <stop offset="1" stop-color="#b0d997" />
    </linearGradient>
    <linearGradient id="f2v-hill-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bce78" />
      <stop offset="1" stop-color="#86c45f" />
    </linearGradient>
    <linearGradient id="f2v-hill-near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5dac2f" />
      <stop offset="1" stop-color="#4c9622" />
    </linearGradient>
    <linearGradient id="f2v-hill-fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d802b" />
      <stop offset="1" stop-color="#1a6417" />
    </linearGradient>
  </defs>

  <!-- Sky + sun -->
  <rect width="1440" height="960" fill="url(#f2v-sky)" />
  <circle cx="1090" cy="240" r="280" fill="url(#f2v-sun)" />
  <circle cx="1090" cy="240" r="78" fill="#fffdf2" opacity="0.85" />

  <!-- Clouds -->
  <g fill="#ffffff">
    <g opacity="0.65">
      <ellipse cx="300" cy="180" rx="118" ry="30" />
      <ellipse cx="360" cy="160" rx="78" ry="26" />
      <ellipse cx="236" cy="192" rx="70" ry="22" />
    </g>
    <g opacity="0.5">
      <ellipse cx="640" cy="120" rx="92" ry="24" />
      <ellipse cx="690" cy="104" rx="58" ry="20" />
    </g>
    <g opacity="0.45">
      <ellipse cx="1180" cy="430" rx="104" ry="26" />
      <ellipse cx="1230" cy="414" rx="64" ry="20" />
    </g>
  </g>

  <!-- Distant birds -->
  <g stroke="#3c5d39" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.45">
    <path d="M748 168 q 13 -12 26 0 q 13 -12 26 0" />
    <path d="M812 196 q 11 -10 22 0 q 11 -10 22 0" />
    <path d="M876 162 q 10 -9 20 0 q 10 -9 20 0" />
  </g>

  <!-- Rolling hills, far → near -->
  <path
    d="M0,560 C 240,510 480,602 720,560 C 960,520 1200,592 1440,548 L1440,960 L0,960 Z"
    fill="url(#f2v-hill-far)"
  />
  <path
    d="M0,684 C 260,632 520,714 780,668 C 1020,626 1252,694 1440,656 L1440,960 L0,960 Z"
    fill="url(#f2v-hill-mid)"
  />
  <path
    d="M0,792 C 300,744 560,834 840,792 C 1084,756 1304,812 1440,782 L1440,960 L0,960 Z"
    fill="url(#f2v-hill-near)"
  />

  <!-- Trees on the near hill -->
  <g>
    <g transform="translate(206,772)">
      <rect x="-5" y="0" width="10" height="30" rx="3" fill="#37621d" />
      <circle cx="0" cy="-8" r="24" fill="#3f8a2c" />
      <circle cx="-18" cy="4" r="17" fill="#357a25" />
      <circle cx="18" cy="4" r="17" fill="#357a25" />
    </g>
    <g transform="translate(1066,742) scale(0.82)">
      <rect x="-5" y="0" width="10" height="30" rx="3" fill="#37621d" />
      <circle cx="0" cy="-8" r="24" fill="#3f8a2c" />
      <circle cx="-18" cy="4" r="17" fill="#357a25" />
      <circle cx="18" cy="4" r="17" fill="#357a25" />
    </g>
    <g transform="translate(1290,792) scale(1.05)">
      <rect x="-5" y="0" width="10" height="30" rx="3" fill="#2f5719" />
      <circle cx="0" cy="-8" r="24" fill="#3a7e28" />
      <circle cx="-18" cy="4" r="17" fill="#316f21" />
      <circle cx="18" cy="4" r="17" fill="#316f21" />
    </g>
  </g>

  <!-- Foreground field with plowed furrows -->
  <path
    d="M0,884 C 320,852 680,918 1000,888 C 1220,868 1360,896 1440,886 L1440,960 L0,960 Z"
    fill="url(#f2v-hill-fg)"
  />
  <g stroke="#3a9a33" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.35">
    <path d="M0,902 C 340,872 700,934 1040,906 C 1240,888 1370,912 1440,904" />
    <path d="M0,922 C 360,894 700,950 1040,926 C 1240,910 1380,930 1440,924" />
    <path d="M0,942 C 360,918 720,966 1060,946 C 1250,934 1380,950 1440,944" />
  </g>
</svg>
