<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Farm2Vet — Design System — 1. Primitive Tokens</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;500;600&family=Helvetica:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="f2v-tokens.css">

    <style>
        /* =========================================================
        COLOR RAMPS
        ========================================================= */
        .ramp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
            gap: 0;
            border-radius: var(--r-lg);
            overflow: hidden;
            margin-bottom: var(--sp-4);
        }
        .ramp-stop {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: var(--sp-2);
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .ramp-stop:hover {
            opacity: 0.88;
        }
        .ramp-stop span {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            opacity: 0.75;
            text-align: center;
            line-height: 1.3;
        }
        .ramp-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--color-text-muted);
            margin-bottom: var(--sp-2);
        }
    </style>
</head>

<body>
    <!-- Primary Ramp -->
    <p class="ramp-label">Primary — Lime Green</p>
    <div class="ramp-grid" id="primary-ramp">
        <div class="ramp-stop" data-token="--primary-50" style="background-color: var(--primary-50);"><span>50<br></span></div>
        <div class="ramp-stop" data-token="--primary-100" style="background-color: var(--primary-100);"><span>100<br></span></div>
        <div class="ramp-stop" data-token="--primary-200" style="background-color: var(--primary-200);"><span>200<br></span></div>
        <div class="ramp-stop" data-token="--primary-300" style="background-color: var(--primary-300);"><span>300<br></span></div>
        <div class="ramp-stop" data-token="--primary-400" style="background-color: var(--primary-400);"><span>400<br></span></div>
        <div class="ramp-stop" data-token="--primary-500" style="background-color: var(--primary-500);"><span>500★<br></span></div>
        <div class="ramp-stop" data-token="--primary-600" style="background-color: var(--primary-600);"><span>600<br></span></div>
        <div class="ramp-stop" data-token="--primary-700" style="background-color: var(--primary-700);"><span>700<br></span></div>
        <div class="ramp-stop" data-token="--primary-800" style="background-color: var(--primary-800);"><span>800<br></span></div>
        <div class="ramp-stop" data-token="--primary-900" style="background-color: var(--primary-900);"><span>900<br></span></div>
        <div class="ramp-stop" data-token="--primary-950" style="background-color: var(--primary-950);"><span>950<br></span></div>
    </div>

    <!-- Secondary Ramp -->
    <p class="ramp-label" style="margin-top:var(--sp-6)">Secondary — Dark Leaf Green</p>
    <div class="ramp-grid" id="secondary-ramp">
        <div class="ramp-stop" data-token="--secondary-50" style="background-color: var(--s50);"><span>50<br></span></div>
        <div class="ramp-stop" data-token="--secondary-100" style="background-color: var(--s100);"><span>100<br></span></div>
        <div class="ramp-stop" data-token="--secondary-200" style="background-color: var(--s200);"><span>200<br></span></div>
        <div class="ramp-stop" data-token="--secondary-300" style="background-color: var(--s300);"><span>300<br></span></div>
        <div class="ramp-stop" data-token="--secondary-400" style="background-color: var(--s400);"><span>400<br></span></div>
        <div class="ramp-stop" data-token="--secondary-500" style="background-color: var(--s500);"><span>500★<br></span></div>
        <div class="ramp-stop" data-token="--secondary-600" style="background-color: var(--s600);"><span>600<br></span></div>
        <div class="ramp-stop" data-token="--secondary-700" style="background-color: var(--s700);"><span>700<br></span></div>
        <div class="ramp-stop" data-token="--secondary-800" style="background-color: var(--s800);"><span>800<br></span></div>
        <div class="ramp-stop" data-token="--secondary-900" style="background-color: var(--s900);"><span>900<br></span></div>
        <div class="ramp-stop" data-token="--secondary-950" style="background-color: var(--s950);"><span>950<br></span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
